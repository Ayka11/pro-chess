<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102030" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>ProChess Web</title>
    <style>
      :root {
        --app-bg:
          radial-gradient(circle at 18% 18%, rgba(107, 186, 255, 0.22) 0%, rgba(107, 186, 255, 0) 28%),
          radial-gradient(circle at 78% 14%, rgba(255, 220, 140, 0.14) 0%, rgba(255, 220, 140, 0) 24%),
          linear-gradient(180deg, #102030 0%, #0b1119 46%, #06090f 100%);
      }
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--app-bg);
      }
      body {
        min-height: 100vh;
      }
      #app {
        position: relative;
        isolation: isolate;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
