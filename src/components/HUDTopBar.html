/*
  ProChess Premium UI/UX HUD Top Bar Skeleton
  -------------------------------------------
  HTML structure for the in-game HUD top bar.
*/

<div class="hud-top-bar">
  <div class="player-hud player1">
    <div class="player-avatar active-turn"></div>
    <div class="player-info">
      <span class="player-name">Player 1</span>
      <span class="piece-count">12</span>
    </div>
  </div>
  <div class="timer-section">
    <span class="turn-indicator">TURN 12</span>
    <div class="timers">
      <span class="timer">02:34</span>
      <span class="timer-divider"></span>
      <span class="timer warning">01:45</span>
    </div>
  </div>
  <div class="player-hud player2">
    <div class="player-avatar"></div>
    <div class="player-info">
      <span class="player-name">Player 2</span>
      <span class="piece-count">8</span>
    </div>
  </div>
</div>
